<!--  form1.html  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Power Yield Prediction</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; background-image: url('https://g.foolcdn.com/editorial/images/560351/a-solar-energy-facility-with-the-sun-setting-in-the-background.jpg'); background-size: cover; background-position: center;">

    <div style="max-width: 400px; margin: 50px auto; padding: 20px; background-color: rgba(255, 255, 255, 0.8); border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
        <h1 style="text-align: center; margin-bottom: 20px; color: #333;">Solar Power Yield Prediction</h1>
        <form method="post" style="margin-bottom: 20px;">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label for="amb" style="display: block; font-weight: bold; margin-bottom: 5px;">Ambient Temperature:</label>
                <input type="number" id="amb" name="amb" style="width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px; transition: border-color 0.3s ease;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="mod" style="display: block; font-weight: bold; margin-bottom: 5px;">Module Temperature:</label>
                <input type="number" id="mod" name="mod" style="width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px; transition: border-color 0.3s ease;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="time" style="display: block; font-weight: bold; margin-bottom: 5px;">Time:</label>
                <input type="number" id="time" name="time" style="width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px; transition: border-color 0.3s ease;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="irr" style="display: block; font-weight: bold; margin-bottom: 5px;">Irradiation:</label>
                <input type="number" id="irr" name="irr" style="width: calc(100% - 22px); padding: 10px; border: 1px solid #ccc; border-radius: 5px; transition: border-color 0.3s ease;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background-color: #4caf50; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s ease;">Predict Yield</button>
        </form>

        {% if predicted_yield %}
        <div style="margin-top: 20px;">
            <h2 style="color: #4caf50; text-align: center;">Predicted Yield: {{ predicted_yield }}  kW</h2>
        </div>
        {% endif %}
    </div>

</body>
</html>
